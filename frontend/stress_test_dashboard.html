        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box
        }

        :root {
            --ink: #0A090C;
            --paper: #F2EFE6;
            --dim: #A89F91;
            --line: rgba(242, 239, 230, .12);
            --amber: #F5A623;
            --red: #E63946;
            --green: #4ADE80;
            --blue: #60A5FA;
            --surface: #111014;
            --surface2: #1A1820;
        }

        html,
        body {
            height: 100%;
            background: var(--ink);
            color: var(--paper);
            font-family: 'Epilogue', sans-serif;
            overflow: hidden
        }

        .serif {
            font-family: 'Instrument Serif', serif
        }

        .mono {
            font-family: 'Azeret Mono', monospace
        }

        /*  LAYOUT  */
        .shell {
            display: grid;
            grid-template-columns: 280px 1fr;
            grid-template-rows: 56px 1fr;
            height: 100vh
        }

        /*  TOPBAR  */
        .topbar {
            grid-column: 1/-1;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 28px;
            border-bottom: 1px solid var(--line);
            background: var(--surface)
        }

        .topbar-brand {
            font-size: 11px;
            letter-spacing: .18em;
            text-transform: uppercase;
            color: var(--dim)
        }

        .topbar-brand span {
            color: var(--amber);
            font-weight: 600
        }

        .kpi-strip {
            display: flex;
            gap: 36px
        }

        .kpi {
            text-align: right
        }

        .kpi-n {
            font-family: 'Azeret Mono', monospace;
            font-size: 18px;
            font-weight: 700;
            line-height: 1
        }

        .kpi-l {
            font-size: 10px;
            color: var(--dim);
            text-transform: uppercase;
            letter-spacing: .1em;
            margin-top: 2px
        }

        .dot {
            width: 7px;
            height: 7px;
            border-radius: 50%;
            background: var(--green);
            animation: pulse 2s infinite;
            display: inline-block;
            margin-right: 8px
        }

        @keyframes pulse {

            0%,
            100% {
                opacity: 1
            }

            50% {
                opacity: .35
            }
        }

        /*  SIDEBAR  */
        .sidebar {
            border-right: 1px solid var(--line);
            overflow-y: auto;
            background: var(--surface)
        }

        .sidebar::-webkit-scrollbar {
            width: 3px
        }

        .sidebar::-webkit-scrollbar-thumb {
            background: var(--line)
        }

        .sidebar-header {
            padding: 20px 20px 12px;
            border-bottom: 1px solid var(--line)
        }

        .sidebar-header p {
            font-size: 10px;
            color: var(--dim);
            text-transform: uppercase;
            letter-spacing: .14em;
            margin-bottom: 6px
        }

        .sidebar-header h2 {
            font-family: 'Instrument Serif', serif;
            font-size: 22px;
            line-height: 1.1
        }

        .company-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 11px 20px;
            cursor: pointer;
            border-bottom: 1px solid var(--line);
            transition: background .15s;
            position: relative
        }

        .company-item:hover,
        .company-item.active {
            background: rgba(245, 166, 35, .06)
        }

        .company-item.active::before {
            content: '';
            position: absolute;
            left: 0;
            top: 0;
            bottom: 0;
            width: 2px;
            background: var(--amber)
        }

        .ci-idx {
            font-family: 'Azeret Mono', monospace;
            font-size: 10px;
            color: var(--dim);
            width: 18px;
            flex-shrink: 0
        }

        .ci-info {
            flex: 1;
            min-width: 0
        }

        .ci-name {
            font-size: 12px;
            font-weight: 500;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis
        }

        .ci-ind {
            font-size: 10px;
            color: var(--dim)
        }

        .ci-score {
            font-family: 'Azeret Mono', monospace;
            font-size: 17px;
            font-weight: 700;
            flex-shrink: 0
        }

        /*  MAIN  */
        .main {
            display: flex;
            flex-direction: column;
            overflow: hidden
        }

        /*  HERO  */
        .hero {
            padding: 24px 32px 20px;
            border-bottom: 1px solid var(--line);
            display: flex;
            align-items: flex-start;
            justify-content: space-between;
            gap: 24px
        }

        .hero-meta {
            min-width: 0
        }

        .hero-tag {
            font-size: 10px;
            color: var(--amber);
            text-transform: uppercase;
            letter-spacing: .18em;
            margin-bottom: 6px
        }

        .hero-name {
            font-family: 'Instrument Serif', serif;
            font-size: 36px;
            line-height: 1.05;
            margin-bottom: 4px
        }

        .hero-industry {
            font-size: 12px;
            color: var(--dim)
        }

        .hero-badges {
            display: flex;
            gap: 8px;
            margin-top: 12px
        }

        .badge {
            font-family: 'Azeret Mono', monospace;
            font-size: 10px;
            font-weight: 600;
            padding: 3px 10px;
            border-radius: 2px;
            text-transform: uppercase;
            letter-spacing: .08em
        }

        .badge-green {
            background: rgba(74, 222, 128, .12);
            color: var(--green);
            border: 1px solid rgba(74, 222, 128, .25)
        }

        .badge-amber {
            background: rgba(245, 166, 35, .12);
            color: var(--amber);
            border: 1px solid rgba(245, 166, 35, .25)
        }

        .badge-red {
            background: rgba(230, 57, 70, .12);
            color: var(--red);
            border: 1px solid rgba(230, 57, 70, .25)
        }

        .badge-blue {
            background: rgba(96, 165, 250, .12);
            color: var(--blue);
            border: 1px solid rgba(96, 165, 250, .25)
        }

        .hero-score-block {
            text-align: right;
            flex-shrink: 0
        }

        .score-giant {
            font-family: 'Instrument Serif', serif;
            font-size: 90px;
            line-height: 1;
            font-style: italic
        }

        .score-label {
            font-size: 10px;
            color: var(--dim);
            text-transform: uppercase;
            letter-spacing: .12em;
            margin-top: -4px
        }

        .score-bar-wrap {
            width: 180px;
            height: 3px;
            background: rgba(255, 255, 255, .08);
            border-radius: 1px;
            margin-top: 10px;
            margin-left: auto
        }

        .score-bar-fill {
            height: 3px;
            border-radius: 1px;
            transition: width 1s cubic-bezier(.4, 0, .2, 1)
        }

        /*  STATS ROW  */
        .stats-row {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            border-bottom: 1px solid var(--line)
        }

        .stat {
            padding: 14px 16px;
            border-right: 1px solid var(--line)
        }

        .stat:last-child {
            border-right: none
        }

        .stat-val {
            font-family: 'Azeret Mono', monospace;
            font-size: 20px;
            font-weight: 700;
            line-height: 1
        }

        .stat-lbl {
            font-size: 9px;
            text-transform: uppercase;
            letter-spacing: .12em;
            color: var(--dim);
            margin-top: 4px
        }

        /*  BODY GRID  */
        .body-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 0;
            flex: 1;
            overflow: hidden
        }

        .panel {
            border-right: 1px solid var(--line);
            overflow-y: auto;
            padding: 20px 24px
        }

        .panel:last-child {
            border-right: none
        }

        .panel::-webkit-scrollbar {
            width: 3px
        }

        .panel::-webkit-scrollbar-thumb {
            background: var(--line)
        }

        .panel-title {
            font-size: 10px;
            text-transform: uppercase;
            letter-spacing: .15em;
            color: var(--dim);
            margin-bottom: 16px;
            display: flex;
            align-items: center;
            gap: 8px
        }

        .panel-title::before {
            content: '';
            flex: 1;
            height: 1px;
            background: var(--line)
        }

        .panel-title::after {
            content: '';
            flex: 1;
            height: 1px;
            background: var(--line)
        }

        .problem {
            padding: 12px 14px;
            margin-bottom: 8px;
            border-left: 2px solid;
            border-radius: 0 4px 4px 0
        }

        .problem h4 {
            font-size: 12px;
            font-weight: 500;
            margin-bottom: 3px
        }

        .problem p {
            font-size: 10px;
            color: var(--dim)
        }

        .problem.critica {
            border-color: var(--red);

        }

        .problem.alta {

        }

        .problem.media {
            border-color: rgba(245, 166, 35, .4);

        }

        .problem.baja {
            border-color: rgba(74, 222, 128, .4);
            background: rgba(74, 222, 128, .04)
        }

            float: right;
            font-family: 'Azeret Mono', monospace;
            font-size: 9px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: .08em;
            margin-left: 8px
        }

        .sev-chip.critica {
            color: var(--red)
        }

        .sev-chip.alta {
            color: var(--amber)
        }

        .sev-chip.media {
            color: rgba(245, 166, 35, .6)
        }

        .sev-chip.baja {
            color: var(--green)
        }

        .rec {
            display: flex;
            gap: 10px;
            margin-bottom: 12px;
            padding-bottom: 12px;
            border-bottom: 1px solid var(--line)
        }

        .rec:last-child {
            border-bottom: none;
            margin-bottom: 0
        }

        .rec-num {
            font-family: 'Azeret Mono', monospace;
            font-size: 11px;
            color: var(--amber);
            width: 20px;
            flex-shrink: 0;
            margin-top: 1px
        }

        .rec-text {
            font-size: 12px;
            line-height: 1.5;
            color: rgba(242, 239, 230, .75)
        }

        /*  CHART CONTAINER  */
        .chart-wrap {
            height: 200px;
            margin-bottom: 20px
        }

        /*  PLAN  */
        .plan-item {
            display: flex;
            gap: 10px;
            margin-bottom: 10px;
            align-items: flex-start
        }

        .plan-dot {
            width: 6px;
            height: 6px;
            border-radius: 50%;
            background: var(--amber);
            flex-shrink: 0;
            margin-top: 5px
        }

        .plan-text {
            font-size: 12px;
            line-height: 1.5;
            color: rgba(242, 239, 230, .65)
        }

        /*  ANIMATIONS  */
        @keyframes fadeSlide {
            from {
                opacity: 0;
                transform: translateY(8px)
            }

            to {
                opacity: 1;
                transform: translateY(0)
            }
        }

        .fade-in {
            animation: fadeSlide .35s ease forwards
        }

        @keyframes countUp {
            from {
                opacity: 0
            }

            to {
                opacity: 1
            }
        }

        /*  SCORE COLORS  */
        .score-excelente {
            color: var(--green)
        }

        .score-bueno {
            color: var(--blue)
        }

        .score-mejora {
            color: var(--amber)
        }

        .score-critico {
            color: var(--red)
        }
    </style>
</head>

                recs: ["Control de inventario en tiempo real", "Recordatorio automtico cotizaciones da 3", "Agenda de visitas B2B semanal", "ERP simplificado para pedidos"],
                plan: ["Sem 1: Inventario digital urgente", "Sem 2: Sistema cotizaciones con expiracin", "Sem 3: Programa visitas B2B", "Sem 4: Integracin proveedores"]
            },
            {
                slug: "hotel-cordillera", n: "Hotel Boutique Cordillera", ind: "Hotelera", score: 37, emp: 35, ticket: 95e3, ciclo: 2,
                m: { leads: 370, ventas: 176, conv: 47.6, ing: 16720e3, mrg: 85e5, tar: 214, tarv: 41 },
                dias: [24, 28, 26, 30, 24, 29, 22, 27, 25, 31, 28, 25, 16, 15].map((l, i) => ({ d: i + 1, l, v: Math.round(l * .47) })),
                probs: [{ t: "41 tareas de mantenimiento vencidas", c: 41, s: "critica" }, { t: "Reviews negativos sin respuesta", c: 7, s: "critica" }, { t: "Overbooking en 3 fechas clave", c: 3, s: "critica" }, { t: "Personal sin capacitacin cliente", c: 8, s: "alta" }, { t: "Sin sistema de fidelizacin", c: 1, s: "alta" }, { t: "Tarifas desactualizadas vs. competencia", c: 1, s: "media" }],
                recs: ["URGENTE: Resolver overbooking y reservas", "Protocolo de respuesta a reviews <12h", "Plan de mantenimiento preventivo", "Capacitacin de atencin al cliente"],
                plan: ["Sem 1: Crisis  overbooking y reviews", "Sem 2: Sistema mantenimiento preventivo", "Sem 3: Capacitacin urgente staff", "Sem 4: Fidelizacin y revenue mgmt"]
            }
        ];

        const COLORS = { critica: '--red', alta: '--amber', media: '--amber', baja: '--green' };
        const icolor = { c: 91, '#4ADE80': 85, '#60A5FA': 60, '#F5A623': 40, '#E63946': 0 };

        function scoreColor(s) {
            if (s >= 80) return 'var(--green)';
            if (s >= 60) return 'var(--blue)';
            if (s >= 40) return 'var(--amber)';
            return 'var(--red)';
        }
        function scoreClass(s) {
            if (s >= 80) return 'score-excelente';
            if (s >= 60) return 'score-bueno';
            if (s >= 40) return 'score-mejora';
            return 'score-critico';
        }
        function scoreLabel(s) {
            if (s >= 80) return 'Excelente';
            if (s >= 60) return 'Bueno';
            if (s >= 40) return 'Necesita Mejora';
            return 'Crtico';
        }
        function fmtCLP(n) {
            if (n >= 1e9) return `$${(n / 1e9).toFixed(2)}B`;
            if (n >= 1e6) return `$${(n / 1e6).toFixed(1)}M`;
            if (n >= 1e3) return `$${(n / 1e3).toFixed(0)}K`;
            return '$' + n;
        }

        // Build sidebar
        document.getElementById('company-list').innerHTML = DATA.map((e, i) => `
<div class="company-item${i === 0 ? ' active' : ''}" onclick="select(${i})" id="ci-${i}">
  <span class="ci-idx mono">${String(i + 1).padStart(2, '0')}</span>
  <div class="ci-info">
    <div class="ci-name">${e.n}</div>
    <div class="ci-ind">${e.ind}</div>
  </div>
  <span class="ci-score ${scoreClass(e.score)}">${e.score}</span>
</div>`).join('');

        let chart = null;
        function select(idx) {
            document.querySelectorAll('.company-item').forEach((el, i) => el.classList.toggle('active', i === idx));
            const e = DATA[idx];
            const sc = scoreColor(e.score);

            // Hero
            document.getElementById('hero').innerHTML = `
  <div class="hero-meta fade-in">
    <div class="hero-tag">${e.ind}  ${e.emp} empleados  Ciclo ${e.ciclo} das</div>
    <div class="hero-name serif">${e.n}</div>
    <div class="hero-badges">
      <span class="badge badge-amber">14 das monitoreados</span>
      <span class="badge ${e.score >= 80 ? 'badge-green' : e.score >= 60 ? 'badge-blue' : e.score >= 40 ? 'badge-amber' : 'badge-red'}">${scoreLabel(e.score)}</span>
      <span class="badge badge-blue">Ticket ${fmtCLP(e.ticket)}</span>
      ${e.probs.some(p => p.s === 'critica') ? '<span class="badge badge-red"> CRTICO</span>' : ''}
    </div>
  </div>
  <div class="hero-score-block fade-in">
    <div class="score-giant ${scoreClass(e.score)}">${e.score}</div>
    <div class="score-label mono">Score de Salud / 100</div>
    <div class="score-bar-wrap"><div class="score-bar-fill" style="width:${e.score}%;background:${sc}"></div></div>
  </div>`;

            // Stats
            const m = e.m;
            document.getElementById('stats-row').innerHTML = `
  <div class="stat"><div class="stat-val" style="color:var(--blue)">${m.leads}</div><div class="stat-lbl">Leads</div></div>
  <div class="stat"><div class="stat-val" style="color:var(--green)">${m.ventas}</div><div class="stat-lbl">Ventas</div></div>
  <div class="stat"><div class="stat-val" style="color:var(--amber)">${m.conv}%</div><div class="stat-lbl">Conversin</div></div>
  <div class="stat"><div class="stat-val">${fmtCLP(m.ing)}</div><div class="stat-lbl">Ingresos</div></div>
  <div class="stat"><div class="stat-val">${fmtCLP(m.mrg)}</div><div class="stat-lbl">Margen</div></div>
  <div class="stat"><div class="stat-val" style="color:var(--amber)">${m.tar}</div><div class="stat-lbl">Tareas</div></div>
  <div class="stat"><div class="stat-val" style="color:${m.tarv > 10 ? 'var(--red)' : 'var(--amber)'}">${m.tarv}</div><div class="stat-lbl">T. Vencidas</div></div>`;

            // Body
            document.getElementById('body-grid').innerHTML = `
  <div class="panel fade-in">
    <div class="panel-title">Tendencia 14 Das</div>
    <div class="chart-wrap"><canvas id="trend-chart"></canvas></div>
    <div class="panel-title">Problemas IA</div>
    ${e.probs.map(p => `<div class="problem ${p.s}">
      <span class="sev-chip ${p.s}">${p.s}</span>
      <h4>${p.t}</h4>
      <p>${p.c} caso${p.c !== 1 ? 's' : ''} detectado${p.c !== 1 ? 's' : ''}</p>
    </div>`).join('')}
  </div>
  <div class="panel fade-in">
    <div class="panel-title">Recomendaciones</div>
    ${e.recs.map((r, i) => `<div class="rec">
      <div class="rec-num">${String(i + 1).padStart(2, '0')}</div>
      <div class="rec-text">${r}</div>
    </div>`).join('')}
    <div class="panel-title" style="margin-top:20px">Plan de Accin 30 Das</div>
    ${e.plan.map(p => `<div class="plan-item"><div class="plan-dot"></div><div class="plan-text">${p}</div></div>`).join('')}
  </div>`;

            // Chart
            if (chart) chart.destroy();
            const ctx = document.getElementById('trend-chart').getContext('2d');
            chart = new Chart(ctx, {
                type: 'line',
                data: {
                    labels: e.dias.map(d => `D${d.d}`),
                    datasets: [
                        { label: 'Leads', data: e.dias.map(d => d.l), borderColor: 'rgba(96,165,250,.8)', backgroundColor: 'rgba(96,165,250,.07)', tension: .4, fill: true, pointRadius: 0, borderWidth: 1.5 },
                        { label: 'Ventas', data: e.dias.map(d => d.v), borderColor: 'rgba(74,222,128,.8)', backgroundColor: 'rgba(74,222,128,.07)', tension: .4, fill: true, pointRadius: 0, borderWidth: 1.5 }
                    ]
                },
                options: {
                    responsive: true, maintainAspectRatio: false,
                    interaction: { mode: 'index', intersect: false },
                    plugins: { legend: { labels: { color: 'rgba(242,239,230,.4)', font: { family: 'Azeret Mono', size: 10 }, boxWidth: 12, padding: 16 } } },
                    scales: {
                        x: { ticks: { color: 'rgba(242,239,230,.25)', font: { family: 'Azeret Mono', size: 9 } }, grid: { color: 'rgba(255,255,255,.03)' }, border: { color: 'rgba(255,255,255,.08)' } },
                        y: { ticks: { color: 'rgba(242,239,230,.25)', font: { family: 'Azeret Mono', size: 9 } }, grid: { color: 'rgba(255,255,255,.05)' }, border: { color: 'rgba(255,255,255,.08)' } }
                    }
                }
            });
        }
        select(0);
    </script>
</body>

</html>
