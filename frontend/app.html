<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/png" href="/assets/img/don_alpa.png">
    <link rel="shortcut icon" href="/favicon.ico">
    <title>ALPA Hub</title>
    <meta name="description" content="Plataforma SaaS Unificada para la gestion de proyectos, contabilidad y prospectos. Potenciado por ALPA Hub.">
    <meta name="robots" content="noindex, nofollow">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>if (window.tailwind) { window.tailwind.config = {}; }</script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/js/all.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <!-- Unified Logic Core -->
    <link rel="stylesheet" href="/assets/css/assistant.css?v=3.2.0">
    <script src="/assets/js/theme-engine.js?v=5.0"></script>
    <script src="/assets/js/config.js?v=3.2.0"></script>
    <script src="/assets/js/branding-engine.js?v=3.2.0" defer></script>
    <script src="/assets/js/bridge.js?v=3.2.0"></script>
    <script src="/assets/js/core.js?v=3.2.0"></script>
    <script src="/assets/js/assistant.js?v=3.2.0"></script>
    <script src="/assets/js/onboarding.js?v=5.0.1" defer></script>
    <script src="/assets/js/trial-guard.js?v=1.0.0" defer></script>
    <script src="/assets/js/alert-service.js?v=1.0.0" defer></script>
    <link rel="stylesheet" href="/assets/css/app-shell.css?v=5.3.0">
    <script src="/assets/js/component-loader.js?v=5.3.0"></script>
</head>

<body>

    <!-- Wrapper (blurred until login) -->
    <div id="main-app" class="app-shell blur-sm">

        <!-- Top Nav Placeholder -->
        <div id="topnav-target"></div>

        <!-- ═══ MAIN AREA ═══ -->
        <div class="app-main">

            <!-- Tab Bar -->
            <div id="tab-bar" class="empty">
                <!-- Populated by TabManager -->
            </div>

            <!-- Onboarding checklist (collapsed, inside main) -->
            <div id="onboarding-panel" class="onboarding-bar hidden">
                <span class="onboarding-bar-label">Activación</span>
                <div class="onboarding-bar-progress">
                    <div id="onboarding-progress-bar" style="width:0%"></div>
                </div>
                <span id="onboarding-percent" class="onboarding-bar-pct">0%</span>
                <div id="onboarding-list" class="onboarding-bar-steps"></div>
            </div>

            <!-- Iframe -->
            <div class="app-frame-wrap">
                <iframe id="app-frame" src="modules/dashboard/index.html"></iframe>
            </div>

        </div>
    </div>

    <!-- Mobile bottom nav -->
    <nav id="mobile-bottom-nav">
        <a onclick="loadModule('dashboard')" id="mob-nav-dashboard"><i class="fa-solid fa-gauge"></i></a>
        <a onclick="loadModule('leads')" id="mob-nav-leads"><i class="fa-solid fa-users-viewfinder"></i></a>
        <a onclick="loadModule('contabilidad')" id="mob-nav-contabilidad"><i class="fa-solid fa-calculator"></i></a>
        <a onclick="loadModule('agentes')" id="mob-nav-agentes"><i class="fa-solid fa-robot"></i></a>
        <a onclick="toggleMobileDrawer()" title="Todos los módulos"><i class="fa-solid fa-border-all"></i></a>
    </nav>

    <!-- Mobile drawer overlay -->
    <div class="mobile-drawer-overlay" id="mobile-drawer-overlay" onclick="toggleMobileDrawer()"></div>

    <!-- Mobile drawer: all remaining modules -->
    <div class="mobile-drawer" id="mobile-drawer">
        <div class="mobile-drawer-handle"><div class="mobile-drawer-handle-bar"></div></div>
        <button class="drawer-item" onclick="loadModule('manager'); toggleMobileDrawer()">
            <i class="fa-solid fa-microchip"></i><span>Sprint</span>
        </button>
        <button class="drawer-item" onclick="loadModule('cotizador'); toggleMobileDrawer()">
            <i class="fa-solid fa-file-invoice"></i><span>Cotizador</span>
        </button>
        <button class="drawer-item" onclick="loadModule('estados_pago'); toggleMobileDrawer()">
            <i class="fa-solid fa-file-invoice-dollar"></i><span>Est. Pago</span>
        </button>
        <button class="drawer-item" onclick="loadModule('ordenes'); toggleMobileDrawer()">
            <i class="fa-solid fa-cart-flatbed"></i><span>Órdenes</span>
        </button>
        <button class="drawer-item" onclick="loadModule('inventario'); toggleMobileDrawer()">
            <i class="fa-solid fa-boxes-stacked"></i><span>Inventario</span>
        </button>
        <button class="drawer-item" onclick="loadModule('directorio'); toggleMobileDrawer()">
            <i class="fa-solid fa-address-book"></i><span>Directorio</span>
        </button>
        <button class="drawer-item" onclick="loadModule('auditoria'); toggleMobileDrawer()">
            <i class="fa-solid fa-clock-rotate-left"></i><span>Auditoría</span>
        </button>
        <button class="drawer-item" onclick="loadModule('settings'); toggleMobileDrawer()">
            <i class="fa-solid fa-gears"></i><span>Config.</span>
        </button>
    </div>

    <!-- Command Palette -->
    <div class="cmd-overlay hidden" id="cmd-palette" onclick="if(event.target===this)CommandPalette.close()">
        <div class="cmd-box">
            <div class="cmd-input-row">
                <i class="fa-solid fa-magnifying-glass"></i>
                <input class="cmd-input" id="cmd-input"
                       placeholder="Buscar módulo, acción o proyecto..."
                       oninput="CommandPalette.search(this.value)"
                       onkeydown="CommandPalette.handleKey(event)">
                <span class="cmd-esc" onclick="CommandPalette.close()">ESC</span>
            </div>
            <div class="cmd-results" id="cmd-results"></div>
            <div class="cmd-footer">
                <span class="cmd-hint"><kbd>↑↓</kbd> navegar</span>
                <span class="cmd-hint"><kbd>↵</kbd> abrir</span>
                <span class="cmd-hint"><kbd>ESC</kbd> cerrar</span>
            </div>
        </div>
    </div>

    <!-- Notification Panel -->
    <div class="notif-panel" id="notif-panel">
        <div class="notif-header">
            <span class="notif-header-title">Notificaciones</span>
            <button class="notif-clear" onclick="NotificationPanel.clear()">Limpiar todo</button>
        </div>
        <div class="notif-list" id="notif-list">
            <div class="notif-empty">Sin notificaciones recientes</div>
        </div>
    </div>

    <!-- Login Overlay Placeholder -->
    <div id="login-target"></div>

    <!-- Onboarding Wizard Placeholder -->
    <div id="onboarding-target"></div>

    <script src="/assets/js/app-shell.js?v=5.3.0"></script>
</body>

</html>
