<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestin de Inventario - ECOSISTEMA V5.0</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/js/all.min.js"></script>
    <link rel="stylesheet" href="../../assets/css/styles.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="../../assets/js/theme-engine.js?v=5.0"></script>
    <script src="../../assets/js/config.js?v=3.2.0"></script>
    <script src="../../assets/js/branding-engine.js?v=3.2.0" defer></script>
    <script src="../../assets/js/bridge.js?v=3.2.0"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&family=Oswald:wght@400;500;700&display=swap');

        /* Fintech v5.1 Palette */
        :root {
            --bg:        #0f1117;
            --surface:   #161b27;
            --surface2:  #1c2233;
            --surface3:  #232b3e;
            --border:    #2a3347;
            --border2:   #374055;
            
            --primary:   #3b82f6;
            --success:   #10b981;
            --warning:   #f97316;
            --danger:    #ef4444;
            --purple:    #8b5cf6;
            
            --text:      #e8eaf6;
            --text-muted: #6b7a99;
            --muted:     #475569;
            
            --accent:    var(--warning);
        }

        .font-tech { font-family: 'Oswald', sans-serif; }

        /* Branding Mappings */
        .text-primary { color: var(--primary); }
        .bg-primary { background-color: var(--primary); }
        .bg-accent { background-color: var(--accent); }
        .border-primary { border-color: var(--primary); }
    </style>
</head>

<body class="min-h-screen p-8" style="background-color: var(--bg); color: var(--text);">

    <div class="max-w-6xl mx-auto">
    <!-- HUD STICKY NAVIGATION -->
    <div class="sticky top-0 z-[100] bg-[#0f1117]/85 backdrop-blur-xl border-b border-white/5 py-3 px-6 mb-8">
        <div class="max-w-6xl mx-auto flex flex-col md:flex-row items-center justify-between gap-4">
            <!-- Identity HUD -->
            <div class="flex items-center gap-4">
                <div
                    class="w-12 h-12 rounded-xl shadow-[0_0_15px_rgba(249,115,22,0.3)] border border-orange-500/20 flex items-center justify-center overflow-hidden bg-[#161b27]">
                    <img src="../../assets/img/don_alpa.png" alt="Logo" class="w-full h-full object-cover">
                </div>
                <div>
                    <h1 class="text-lg font-bold font-tech tracking-tight text-white">CONTROL DE <span class="text-orange-500">INVENTARIO</span></h1>
                    <p class="text-[9px] uppercase tracking-[0.2em] text-muted font-extrabold">Stock Intelligence v5.1</p>
                </div>
            </div>

            <!-- Action Buttons HUD -->
            <div class="flex items-center gap-3">
                    <button onclick="renderInventory()" class="p-2 rounded-lg transition-all text-muted hover:text-white hover:bg-white/5 border border-white/5">
                        <i class="fa-solid fa-sync-alt"></i>
                    </button>
                    <button onclick="openModal()"
                        class="text-white px-5 py-2 rounded-lg bg-orange-600 hover:bg-orange-500 transition-all shadow-lg shadow-orange-500/20 flex items-center gap-2 font-black uppercase text-[10px] tracking-widest border border-orange-400/30">
                        <i class="fa-solid fa-plus-circle"></i> Nuevo Item
                    </button>
            </div>
        </div>
    </div>

        <!-- Stats Row -->
        <div class="grid grid-cols-1 md:grid-cols-3 gap-6 mb-8">
            <div class="p-6 rounded-xl shadow-sm border-l-4" style="background-color: var(--surface); border-color: var(--border); border-left-color: #3b82f6;">
                <div class="flex justify-between items-center">
                    <div>
                        <p class="text-xs uppercase font-bold" style="color: var(--muted);">Total Items</p>
                        <p id="stat-total" class="text-3xl font-bold" style="color: var(--text);">0</p>
                    </div>
                    <div
                        class="w-12 h-12 rounded-full flex items-center justify-center text-blue-500 text-xl" style="background-color: rgba(59, 130, 246, 0.1);">
                        <i class="fa-solid fa-boxes-stacked"></i>
                    </div>
                </div>
            </div>
            <div class="p-6 rounded-xl shadow-sm border-l-4" style="background-color: var(--surface); border-color: var(--border); border-left-color: #10b981;">
                <div class="flex justify-between items-center">
                    <div>
                        <p class="text-xs uppercase font-bold" style="color: var(--muted);">Valorizado (Est.)</p>
                        <p id="stat-value" class="text-3xl font-bold" style="color: var(--text);">$0</p>
                    </div>
                    <div
                        class="w-12 h-12 rounded-full flex items-center justify-center text-green-500 text-xl" style="background-color: rgba(16, 185, 129, 0.1);">
                        <i class="fa-solid fa-sack-dollar"></i>
                    </div>
                </div>
            </div>
            <div class="p-6 rounded-xl shadow-sm border-l-4 text-red-500" style="background-color: var(--surface); border-color: var(--border); border-left-color: #ef4444;">
                <div class="flex justify-between items-center">
                    <div>
                        <p class="text-xs uppercase font-bold" style="color: var(--muted);">Stock Crítico</p>
                        <p id="stat-low" class="text-3xl font-bold">0</p>
                    </div>
                    <div class="w-12 h-12 rounded-full flex items-center justify-center text-xl" style="background-color: rgba(239, 68, 68, 0.1);">
                        <i class="fa-solid fa-triangle-exclamation"></i>
                    </div>
                </div>
            </div>
        </div>

        <!-- Inventory Table -->
        <div class="rounded-xl shadow-sm border overflow-hidden" style="background-color: var(--surface); border-color: var(--border);">
            <div class="p-4 border-b flex gap-4" style="background-color: var(--surface2); border-color: var(--border);">
                <div class="relative flex-1">
                    <i class="fa-solid fa-search absolute left-3 top-3" style="color: var(--muted);"></i>
                    <input type="text" id="search-input" placeholder="Buscar por nombre o cdigo SKU..."
                        oninput="renderInventory()"
                        class="w-full pl-10 pr-4 py-2 border rounded-lg focus:outline-none focus:border-blue-500" style="background-color: var(--bg); color: var(--text); border-color: var(--border);">
                </div>
                <button onclick="renderInventory()" class="px-4 rounded transition" style="background-color: var(--surface); color: var(--muted); border: 1px solid var(--border);">
                    <i class="fa-solid fa-sync-alt"></i>
                </button>
            </div>
            <div class="overflow-x-auto">
                <table class="w-full text-left">
                    <thead class="text-xs uppercase font-bold" style="background-color: var(--surface2); color: var(--muted);">
                        <tr>
                            <th class="px-6 py-4">Cdigo (SKU)</th>
                            <th class="px-6 py-4">Descripcin / Producto</th>
                            <th class="px-6 py-4 text-center">Unidad</th>
                            <th class="px-6 py-4 text-center">Stock Actual</th>
                            <th class="px-6 py-4 text-center">Estado</th>
                            <th class="px-6 py-4 text-right">Acciones</th>
                        </tr>
                    </thead>
                    <tbody id="inventory-body" class="divide-y text-sm" style="divide-color: var(--border); color: var(--text);">
                        <!-- JS populated -->
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <!-- Modal Form -->
    <div id="item-modal" class="hidden fixed inset-0 bg-black/80 backdrop-blur-md flex items-center justify-center z-50">
        <div class="p-8 rounded-xl shadow-2xl w-full max-w-md border border-white/10" style="background-color: var(--surface2);">
            <div class="flex justify-between items-center mb-6">
                <h2 class="text-xl font-bold" style="color: var(--text);">Item de Inventario</h2>
                <button onclick="closeModal()" class="text-muted hover:text-red-500 transition-colors"><i
                        class="fa-solid fa-times text-xl"></i></button>
            </div>
            <form id="inventory-form" onsubmit="saveItem(event)">
                <div class="space-y-4">
                    <div>
                        <label class="block text-xs font-bold uppercase tracking-widest mb-1" style="color: var(--text-muted);">Cdigo (SKU)</label>
                        <input type="text" id="item-sku" class="w-full border rounded-lg px-3 py-2 focus:ring-2 focus:ring-orange-500 outline-none"
                            style="background-color: var(--bg); color: var(--text); border-color: var(--border);" value="GEN-001" required>
                    </div>
                    <div>
                        <label class="block text-xs font-bold uppercase tracking-widest mb-1" style="color: var(--text-muted);">Nombre / Descripcin</label>
                        <input type="text" id="item-name" class="w-full border rounded-lg px-3 py-2 focus:ring-2 focus:ring-orange-500 outline-none"
                            style="background-color: var(--bg); color: var(--text); border-color: var(--border);" placeholder="Ej: Casco Seguridad" required>
                    </div>
                    <div class="grid grid-cols-2 gap-4">
                        <div>
                            <label class="block text-xs font-bold uppercase tracking-widest mb-1" style="color: var(--text-muted);">Stock Inicial</label>
                            <input type="number" id="item-stock" class="w-full border rounded-lg px-3 py-2 focus:ring-2 focus:ring-orange-500 outline-none"
                                style="background-color: var(--bg); color: var(--text); border-color: var(--border);" value="0" min="0" required>
                        </div>
                        <div>
                            <label class="block text-xs font-bold uppercase tracking-widest mb-1" style="color: var(--text-muted);">Unidad</label>
                            <select id="item-unit" class="w-full border rounded-lg px-3 py-2 focus:ring-2 focus:ring-orange-500 outline-none"
                                style="background-color: var(--bg); color: var(--text); border-color: var(--border);">
                                <option value="unid">Unid</option>
                                <option value="par">Par</option>
                                <option value="kg">Kg</option>
                                <option value="lts">Lts</option>
                                <option value="lote">Lote</option>
                                <option value="caja">Caja</option>
                            </select>
                        </div>
                    </div>
                </div>
                <div class="mt-8 flex justify-end gap-3">
                    <button type="button" onclick="closeModal()"
                        class="px-5 py-2 text-[10px] font-black uppercase tracking-widest rounded-lg transition-all" style="background-color: var(--surface); color: var(--text-muted); border: 1px solid var(--border);">Cancelar</button>
                    <button type="submit"
                        class="bg-orange-600 text-white px-6 py-2 rounded-lg hover:bg-orange-500 shadow-lg shadow-orange-500/20 font-black uppercase text-[10px] tracking-widest transition-all">Guardar</button>
                </div>
            </form>
        </div>
    </div>

    <script>
        // --- LOGIC ---

        document.addEventListener('DOMContentLoaded', () => {
            renderInventory();
        });

        async function renderInventory() {
            let items = await AlpaHub.execute('getInventory') || [];

            const search = document.getElementById('search-input').value.toLowerCase();
            if (search) {
                items = items.filter(i => (i.name || '').toLowerCase().includes(search) || (i.sku || '').toLowerCase().includes(search));
            }

            const tbody = document.getElementById('inventory-body');
            tbody.innerHTML = '';

            let lowStock = 0;

            items.forEach(item => {
                const stock = parseInt(item.stock || 0);
                if (stock < 5) lowStock++;

                const row = document.createElement('tr');
                row.className = 'hover:bg-white/5 transition border-b border-white/5';
                row.innerHTML = `
                    <td class="px-6 py-4 font-mono text-xs font-bold" style="color: var(--text-muted);">${item.sku}</td>
                    <td class="px-6 py-4 font-black text-white">${item.name}</td>
                    <td class="px-6 py-4 text-center">
                        <span class="px-3 py-1 text-[10px] font-black uppercase tracking-widest rounded-md" style="background-color: var(--surface2); color: var(--text-muted); border: 1px solid var(--border);">${item.unit || 'unid'}</span>
                    </td>
                    <td class="px-6 py-4 text-center font-black text-lg ${stock < 5 ? 'text-red-500' : 'text-green-500'}">${stock}</td>
                    <td class="px-6 py-4 text-center">
                        ${stock > 0 ?
                        '<span class="px-2 py-1 bg-green-500/10 text-green-400 rounded-full text-[9px] font-black uppercase border border-green-500/20 tracking-tighter">Disponible</span>' :
                        '<span class="px-2 py-1 bg-red-500/10 text-red-400 rounded-full text-[9px] font-black uppercase border border-red-500/20 tracking-tighter">Agotado</span>'}
                    </td>
                    <td class="px-6 py-4 text-right">
                         <button onclick="editItem('${item.sku}')" class="text-blue-400 hover:text-blue-300 mr-3 transition-colors"><i class="fa-solid fa-edit"></i></button>
                         <button onclick="deleteItem('${item.sku}')" class="text-red-400 hover:text-red-300 transition-colors"><i class="fa-solid fa-trash"></i></button>
                    </td>
                 `;
                tbody.appendChild(row);
            });

            document.getElementById('stat-total').innerText = items.length;
            document.getElementById('stat-low').innerText = lowStock;
            document.getElementById('stat-value').innerText = '$ ' + (items.length * 15000).toLocaleString('es-CL');
        }

        function openModal() {
            document.getElementById('inventory-form').reset();
            const timestamp = Date.now().toString().slice(-4);
            document.getElementById('item-sku').value = `MAT-${timestamp}`;
            document.getElementById('item-modal').classList.remove('hidden');
        }

        function closeModal() {
            document.getElementById('item-modal').classList.add('hidden');
        }

        async function editItem(sku) {
            const items = await AlpaHub.execute('getInventory') || [];
            const item = items.find(i => i.sku === sku);
            if (item) {
                document.getElementById('item-sku').value = item.sku;
                document.getElementById('item-name').value = item.name;
                document.getElementById('item-stock').value = item.stock;
                document.getElementById('item-unit').value = item.unit || 'unid';
                document.getElementById('item-modal').classList.remove('hidden');
            }
        }

        async function saveItem(e) {
            e.preventDefault();
            const sku = document.getElementById('item-sku').value;
            const name = document.getElementById('item-name').value;
            const stock = parseInt(document.getElementById('item-stock').value);
            const unit = document.getElementById('item-unit').value;

            const success = await AlpaHub.execute('upsertInventoryItem', { sku, name, stock, unit });
            if (success) {
                AlpaHub.showNotification('Inventario actualizado', 'success');
            }

            closeModal();
            renderInventory();
        }

        async function deleteItem(sku) {
            if (confirm('Eliminar este item?')) {
                const success = await AlpaHub.execute('deleteInventoryItem', sku);
                if (success) {
                    renderInventory();
                }
            }
        }

    </script>
</body>

</html>
